name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # เปลี่ยนจาก ./gradlew build เป็นคำสั่งสร้างไฟล์ APK โดยตรง
    - name: Build APK with Gradle
      run: ./gradlew assembleDebug

    # เพิ่มคำสั่งนี้ เพื่อให้ GitHub ส่งไฟล์ APK ออกมาให้ดาวน์โหลดได้
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: opsu-apk-file
        path: "**/build/outputs/apk/debug/*.apk"
