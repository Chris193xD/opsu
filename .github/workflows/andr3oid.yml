name: Android CI Custom Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest  

    steps:
    - uses: actions/checkout@v4 

    - name: set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Fix line endings
      run: sed -i 's/\r$//' gradlew

    - name: Grant execution permission
      run: chmod +x gradlew

    # แก้ไขจุดนี้: สั่งให้ค้นหาทาสก์ทั้งหมดในโปรเจกต์เพื่อเลี่ยงปัญหาหาโฟลเดอร์ไม่เจอ
    - name: Build APK with Gradle
      run: ./gradlew :app:assembleDebug --no-daemon || ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: opsu-custom-apk
        path: "**/build/outputs/apk/**/*.apk"
